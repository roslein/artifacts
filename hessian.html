<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hessian 곡면 시각화 (Pure HTML)</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    canvas {
      background: #fff;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 10px;
    }

    .controls label {
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hud {
      font-family: monospace;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h3>Hessian 곡면 시각화</h3>

<canvas id="canvas" width="420" height="420"></canvas>

<div class="controls">
  <label>Lxx
    <input type="range" min="-3" max="3" step="0.1" value="1" id="lxx">
  </label>
  <label>Lyy
    <input type="range" min="-3" max="3" step="0.1" value="-1" id="lyy">
  </label>
  <label>Lxy
    <input type="range" min="-3" max="3" step="0.1" value="0" id="lxy">
  </label>
</div>

<div class="hud" id="hud"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const sliders = {
  lxx: document.getElementById("lxx"),
  lyy: document.getElementById("lyy"),
  lxy: document.getElementById("lxy")
};

function draw() {
  const Lxx = parseFloat(sliders.lxx.value);
  const Lyy = parseFloat(sliders.lyy.value);
  const Lxy = parseFloat(sliders.lxy.value);

  const det = Lxx * Lyy - Lxy * Lxy;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.translate(canvas.width / 2, canvas.height / 2);

  const scale = 0.015;

  // Draw surface as height map (top-down shading)
  for (let x = -200; x < 200; x += 4) {
    for (let y = -200; y < 200; y += 4) {
      const z =
        0.5 * Lxx * x * x +
        Lxy * x * y +
        0.5 * Lyy * y * y;

      const intensity = Math.max(-255, Math.min(255, z * scale));
      const c = intensity > 0 ? `rgb(255,${255-intensity},${255-intensity})`
                              : `rgb(${255+intensity},${255+intensity},255)`;

      ctx.fillStyle = c;
      ctx.fillRect(x, y, 4, 4);
    }
  }

  ctx.setTransform(1,0,0,1,0,0);

  let label;
  if (det > 0) label = "Blob (안정, 특징점)";
  else if (det < 0) label = "Saddle / Edge (불안정)";
  else label = "Flat / Line";

  document.getElementById("hud").innerText =
    `Det = ${det.toFixed(2)} → ${label}`;
}

Object.values(sliders).forEach(s => s.addEventListener("input", draw));
draw();
</script>

</body>
</html>
