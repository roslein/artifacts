<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quaternion Double Cover (High Contrast)</title>
<style>
/* 전체적인 대비 향상 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0f14; color: #e0e6f1; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }

.wrap { max-width: 860px; margin: 0 auto; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

canvas {
  background: #050608; /* 더 어두운 배경으로 대비 강화 */
  border: 1px solid #3b4261;
  border-radius: 12px;
  display: block;
  width: 100%;
  cursor: grab;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.canvas-label { font-size: 13px; color: #a9b1d6; margin: 0 0 8px; font-weight: 600; }
.canvas-hint  { font-size: 11px; color: #565f89; margin: 8px 0 0; text-align: center; }

.panel {
  background: #16161e;
  border: 1px solid #3b4261;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}

.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

label { font-size: 12px; color: #9aa5ce; }

input[type=range] { accent-color: #7aa2f7; cursor: pointer; }

.qval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.card-q {
  background: #1a2b4d;
  border: 1px solid #2ac3ff;
  border-radius: 8px;
  padding: 12px;
}
.card-negq {
  background: #3d1a1a;
  border: 1px solid #ff4444;
  border-radius: 8px;
  padding: 12px;
}
.card-tag { font-size: 11px; font-weight: 800; margin: 0 0 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.card-q   .card-tag { color: #7aa2f7; }
.card-negq .card-tag { color: #f7768e; }
.card-val { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: #c0caf5; margin: 0; }

.bar-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.bar-label { font-size: 11px; color: #9aa5ce; margin: 0 0 6px; }
.bar-track { background: #24283b; border-radius: 6px; height: 10px; overflow: hidden; margin-bottom: 6px; border: 1px solid #414868; }
.bar-val { font-size: 12px; font-family: monospace; font-weight: 600; }
.bar-val-wrong { color: #f7768e; }
.bar-val-right { color: #73daca; }

.section-title { font-size: 12px; color: #787c99; font-weight: 600; margin: 0 0 10px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap">

  <div class="grid2">
    <div>
      <p class="canvas-label">S³ 위의 단위 쿼터니언 (4D → 3D 투영)</p>
      <canvas id="s3canvas" width="620" height="620"></canvas>
      <p class="canvas-hint">드래그하여 구체 회전</p>
    </div>
    <div>
      <p class="canvas-label">3D 공간 실제 회전 결과 (SO(3))</p>
      <canvas id="so3canvas" width="620" height="620"></canvas>
      <p class="canvas-hint">q와 −q는 물리적으로 동일한 상태</p>
    </div>
  </div>

  <div class="panel">
    <div class="controls-grid">
      <div>
        <p class="canvas-label" style="margin-bottom:10px; color:#bb9af7;">회전축 제어</p>
        <div style="display:flex; gap:10px; align-items:center;">
          <label>X</label>
          <input type="range" id="ax" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
          <label>Y</label>
          <input type="range" id="ay" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
          <label>Z</label>
          <input type="range" id="az" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
        </div>
      </div>
      <div>
        <p class="canvas-label" style="margin-bottom:10px; color:#bb9af7;">회전 각도: <span id="angleval" style="color:#ffffff; font-family:monospace;">120</span>°</p>
        <input type="range" id="angle" min="0" max="360" value="120" style="width:100%;">
      </div>
    </div>
    <div class="qval-grid">
      <div class="card-q">
        <p class="card-tag">Quaternion q</p>
        <p class="card-val" id="qval">—</p>
      </div>
      <div class="card-negq">
        <p class="card-tag">Antipodal −q</p>
        <p class="card-val" id="negqval">—</p>
      </div>
    </div>
  </div>

  <div class="panel">
    <p class="section-title">거리 계산 및 보간 시 주의사항</p>
    <div class="bar-section">
      <div>
        <p class="bar-label">유클리드 거리 (직선 오차)</p>
        <div class="bar-track"><div id="wrongbar" style="height:100%; background:#f7768e; width:100%;"></div></div>
        <p class="bar-val bar-val-wrong" id="wrongval">값이 크지만 사실 같은 회전</p>
      </div>
      <div>
        <p class="bar-label">쿼터니언 내적 유사도 (절댓값)</p>
        <div class="bar-track"><div id="rightbar" style="height:100%; background:#73daca; width:100%;"></div></div>
        <p class="bar-val bar-val-right" id="rightval">|q·(−q)| = 1.000</p>
      </div>
    </div>
  </div>

</div>

<script>
const s3c  = document.getElementById('s3canvas');
const so3c = document.getElementById('so3canvas');
const ctx1 = s3c.getContext('2d');
const ctx2 = so3c.getContext('2d');

let camTheta = 0.5, camPhi = 0.4;
let dragging = false, lastX, lastY;

s3c.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; s3c.style.cursor = 'grabbing'; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta += (e.clientX - lastX) * 0.01;
  camPhi   += (e.clientY - lastY) * 0.01;
  camPhi    = Math.max(-1.4, Math.min(1.4, camPhi));
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; s3c.style.cursor = 'grab'; });

function proj(x, y, z, W, H, scale) {
  const e1x =  Math.cos(camTheta), e1z = -Math.sin(camTheta);
  const e2x =  Math.sin(camPhi) * Math.sin(camTheta);
  const e2y =  Math.cos(camPhi);
  const e2z =  Math.sin(camPhi) * Math.cos(camTheta);
  const e3x =  Math.cos(camPhi) * Math.sin(camTheta);
  const e3y = -Math.sin(camPhi);
  const e3z =  Math.cos(camPhi) * Math.cos(camTheta);
  return {
    sx:    W/2 + (e1x*x + e1z*z) * scale,
    sy:    H/2 - (e2x*x + e2y*y + e2z*z) * scale,
    depth:        e3x*x + e3y*y + e3z*z
  };
}

function getQuaternion() {
  const deg  = parseFloat(document.getElementById('angle').value);
  const half = deg * Math.PI / 180 / 2;
  let ax = parseFloat(document.getElementById('ax').value);
  let ay = parseFloat(document.getElementById('ay').value);
  let az = parseFloat(document.getElementById('az').value);
  const len = Math.sqrt(ax*ax + ay*ay + az*az) || 1;
  ax /= len; ay /= len; az /= len;
  const s = Math.sin(half);
  return { w: Math.cos(half), x: ax*s, y: ay*s, z: az*s, ax, ay, az, angleDeg: deg };
}

function rotateVec(q, vx, vy, vz) {
  const tx = 2*(q.y*vz - q.z*vy);
  const ty = 2*(q.z*vx - q.x*vz);
  const tz = 2*(q.x*vy - q.y*vx);
  return {
    x: vx + q.w*tx + q.y*tz - q.z*ty,
    y: vy + q.w*ty + q.z*tx - q.x*tz,
    z: vz + q.w*tz + q.x*ty - q.y*tx
  };
}

function drawSphereGrid(ctx, W, H, scale) {
  // 선명도 강화를 위해 색상과 투명도 조정
  ctx.strokeStyle = 'rgba(100, 150, 255, 0.4)'; 
  ctx.lineWidth = 1;
  
  // 경선
  for (let lat = -80; lat <= 80; lat += 20) {
    const r  = Math.cos(lat * Math.PI/180);
    const yy = Math.sin(lat * Math.PI/180);
    ctx.beginPath();
    for (let lng = 0; lng <= 360; lng += 5) {
      const p = proj(r*Math.cos(lng*Math.PI/180), yy, r*Math.sin(lng*Math.PI/180), W, H, scale);
      lng === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
    }
    ctx.stroke();
  }
  // 위선
  for (let lng = 0; lng < 360; lng += 30) {
    ctx.beginPath();
    for (let lat = -90; lat <= 90; lat += 5) {
      const r  = Math.cos(lat * Math.PI/180);
      const yy = Math.sin(lat * Math.PI/180);
      const p  = proj(r*Math.cos(lng*Math.PI/180), yy, r*Math.sin(lng*Math.PI/180), W, H, scale);
      lat === -90 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
    }
    ctx.stroke();
  }
}

function drawS3() {
  const W = s3c.width, H = s3c.height;
  ctx1.clearRect(0, 0, W, H);
  const scale = W * 0.38;

  drawSphereGrid(ctx1, W, H, scale);

  const q = getQuaternion();

  /* 회전축 - 더 밝게 표시 */
  const aHead = proj( q.ax*0.9,  q.ay*0.9,  q.az*0.9, W, H, scale);
  const aTail = proj(-q.ax*0.9, -q.ay*0.9, -q.az*0.9, W, H, scale);
  ctx1.strokeStyle = 'rgba(200,210,255,0.6)';
  ctx1.lineWidth = 1.5;
  ctx1.setLineDash([5, 5]);
  ctx1.beginPath();
  ctx1.moveTo(aTail.sx, aTail.sy);
  ctx1.lineTo(aHead.sx, aHead.sy);
  ctx1.stroke();
  ctx1.setLineDash([]);

  /* q ↔ −q 연결선 - 네온 느낌으로 강화 */
  const pq  = proj( q.x,  q.y,  q.z, W, H, scale);
  const pnq = proj(-q.x, -q.y, -q.z, W, H, scale);
  ctx1.strokeStyle = 'rgba(122, 162, 247, 0.8)';
  ctx1.lineWidth = 2;
  ctx1.setLineDash([4, 4]);
  ctx1.beginPath();
  ctx1.moveTo(pq.sx, pq.sy);
  ctx1.lineTo(pnq.sx, pnq.sy);
  ctx1.stroke();
  ctx1.setLineDash([]);

  /* q 점 */
  ctx1.fillStyle = '#7aa2f7';
  ctx1.shadowBlur = 10;
  ctx1.shadowColor = '#7aa2f7';
  ctx1.beginPath();
  ctx1.arc(pq.sx, pq.sy, 10, 0, Math.PI*2);
  ctx1.fill();
  ctx1.shadowBlur = 0;
  
  ctx1.fillStyle = '#000000';
  ctx1.font = 'bold 12px sans-serif';
  ctx1.textAlign = 'center';
  ctx1.textBaseline = 'middle';
  ctx1.fillText('q', pq.sx, pq.sy);

  /* −q 점 */
  ctx1.fillStyle = '#f7768e';
  ctx1.shadowBlur = 10;
  ctx1.shadowColor = '#f7768e';
  ctx1.beginPath();
  ctx1.arc(pnq.sx, pnq.sy, 10, 0, Math.PI*2);
  ctx1.fill();
  ctx1.shadowBlur = 0;
  
  ctx1.fillStyle = '#000000';
  ctx1.fillText('−q', pnq.sx, pnq.sy);

  /* 축 라벨 - 고대비 흰색 */
  ctx1.fillStyle = '#ffffff';
  ctx1.font = 'bold 13px sans-serif';
  ctx1.textAlign = 'left';
  ctx1.fillText('Axis', aHead.sx + 8, aHead.sy);
}

function drawSO3() {
  const W = so3c.width, H = so3c.height;
  ctx2.clearRect(0, 0, W, H);
  const scale = W * 0.34;
  const q = getQuaternion();
  const origin = proj(0, 0, 0, W, H, scale);

  const axes = [
    { vx:1, vy:0, vz:0, color:'#ff4444', label:'X' },
    { vx:0, vy:1, vz:0, color:'#50fa7b', label:'Y' },
    { vx:0, vy:0, vz:1, color:'#8be9fd', label:'Z' }
  ];

  axes.forEach(a => {
    const r  = rotateVec(q, a.vx*0.78, a.vy*0.78, a.vz*0.78);
    const rp = proj(r.x, r.y, r.z, W, H, scale);
    const dx = rp.sx - origin.sx, dy = rp.sy - origin.sy;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;

    ctx2.strokeStyle = a.color;
    ctx2.lineWidth = 3;
    ctx2.beginPath();
    ctx2.moveTo(origin.sx, origin.sy);
    ctx2.lineTo(rp.sx, rp.sy);
    ctx2.stroke();

    ctx2.fillStyle = a.color;
    ctx2.beginPath();
    ctx2.moveTo(rp.sx, rp.sy);
    ctx2.lineTo(rp.sx - dx/len*12 + dy/len*6, rp.sy - dy/len*12 - dx/len*6);
    ctx2.lineTo(rp.sx - dx/len*12 - dy/len*6, rp.sy - dy/len*12 + dx/len*6);
    ctx2.closePath();
    ctx2.fill();

    ctx2.fillStyle = '#ffffff';
    ctx2.font = 'bold 14px sans-serif';
    ctx2.textAlign = 'center';
    ctx2.fillText(a.label, rp.sx + dx/len*18, rp.sy + dy/len*18);
  });

  ctx2.fillStyle = '#444b6a';
  ctx2.beginPath();
  ctx2.arc(origin.sx, origin.sy, 5, 0, Math.PI*2);
  ctx2.fill();
}

function updateUI() {
  const q = getQuaternion();
  const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(3);
  document.getElementById('qval').textContent    = `[${fmt(q.w)}, ${fmt(q.x)}i, ${fmt(q.y)}j, ${fmt(q.z)}k]`;
  document.getElementById('negqval').textContent = `[${fmt(-q.w)}, ${fmt(-q.x)}i, ${fmt(-q.y)}j, ${fmt(-q.z)}k]`;
  document.getElementById('angleval').textContent = Math.round(q.angleDeg);

  const dot  = q.w*q.w + q.x*q.x + q.y*q.y + q.z*q.z;
  const eucl = (2 * Math.sqrt(dot)).toFixed(3);
  document.getElementById('wrongval').textContent = 'Distance = ' + eucl + ' (오류 발생 가능)';
  document.getElementById('rightval').textContent = '|q·(−q)| = ' + Math.abs(-dot).toFixed(3) + ' (항상 일치)';
}

function draw() { drawS3(); drawSO3(); updateUI(); }

['ax','ay','az','angle'].forEach(id => document.getElementById(id).addEventListener('input', draw));

function animate() {
  if (!dragging) camTheta += 0.003;
  draw();
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
