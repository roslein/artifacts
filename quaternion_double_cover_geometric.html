
<h2 class="sr-only">Quaternion Double Cover: S³에서 SO(3)로의 2:1 매핑을 기하학적으로 보여주는 인터랙티브 시각화</h2>

<div style="padding: 1rem 0; font-family: var(--font-sans);">

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
  <div>
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 6px;">S³ 위의 단위 쿼터니언</p>
    <canvas id="s3canvas" width="310" height="310" style="border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); display: block; cursor: grab; width: 100%;"></canvas>
    <p style="font-size: 12px; color: var(--color-text-secondary); margin: 6px 0 0; text-align: center;">드래그하여 회전</p>
  </div>
  <div>
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 6px;">3D 공간에서의 실제 회전 결과</p>
    <canvas id="so3canvas" width="310" height="310" style="border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); display: block; width: 100%;"></canvas>
    <p style="font-size: 12px; color: var(--color-text-secondary); margin: 6px 0 0; text-align: center;">두 쿼터니언 모두 동일한 자세</p>
  </div>
</div>

<div style="border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 16px;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
    <div>
      <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px;">회전축</p>
      <div style="display: flex; gap: 8px; align-items: center;">
        <label style="font-size: 12px; color: var(--color-text-secondary);">X</label>
        <input type="range" id="ax" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
        <label style="font-size: 12px; color: var(--color-text-secondary);">Y</label>
        <input type="range" id="ay" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
        <label style="font-size: 12px; color: var(--color-text-secondary);">Z</label>
        <input type="range" id="az" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
      </div>
    </div>
    <div>
      <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px;">회전 각도: <span id="angleval">120</span>°</p>
      <input type="range" id="angle" min="0" max="360" value="120" style="width: 100%;">
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
    <div style="background: var(--color-background-info); border-radius: var(--border-radius-md); padding: 10px 12px;">
      <p style="font-size: 11px; color: var(--color-text-info); margin: 0 0 3px; font-weight: 500;">q (앞면)</p>
      <p style="font-size: 12px; font-family: var(--font-mono); color: var(--color-text-primary); margin: 0;" id="qval">—</p>
    </div>
    <div style="background: var(--color-background-danger); border-radius: var(--border-radius-md); padding: 10px 12px;">
      <p style="font-size: 11px; color: var(--color-text-danger); margin: 0 0 3px; font-weight: 500;">−q (대척점)</p>
      <p style="font-size: 12px; font-family: var(--font-mono); color: var(--color-text-primary); margin: 0;" id="negqval">—</p>
    </div>
  </div>
</div>

<div style="border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 16px;">
  <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 8px; font-weight: 500;">내적 유사도 비교</p>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div>
      <p style="font-size: 11px; color: var(--color-text-secondary); margin: 0 0 4px;">단순 차이 (틀린 방법)</p>
      <div style="height: 8px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden;">
        <div id="wrongbar" style="height: 100%; background: #E24B4A; transition: width 0.3s; width: 100%;"></div>
      </div>
      <p style="font-size: 11px; font-family: var(--font-mono); color: var(--color-text-secondary); margin: 4px 0 0;" id="wrongval">오차 커 보임</p>
    </div>
    <div>
      <p style="font-size: 11px; color: var(--color-text-secondary); margin: 0 0 4px;">|내적| (올바른 방법)</p>
      <div style="height: 8px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden;">
        <div id="rightbar" style="height: 100%; background: #1D9E75; transition: width 0.3s; width: 100%;"></div>
      </div>
      <p style="font-size: 11px; font-family: var(--font-mono); color: var(--color-text-secondary); margin: 4px 0 0;" id="rightval">|q·(−q)| = 1.000</p>
    </div>
  </div>
</div>

</div>

<script>
const s3c = document.getElementById('s3canvas');
const so3c = document.getElementById('so3canvas');
const ctx1 = s3c.getContext('2d');
const ctx2 = so3c.getContext('2d');

let camTheta = 0.5, camPhi = 0.4;
let dragging = false, lastX, lastY;

s3c.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; s3c.style.cursor = 'grabbing'; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta += (e.clientX - lastX) * 0.01;
  camPhi   += (e.clientY - lastY) * 0.01;
  camPhi = Math.max(-1.4, Math.min(1.4, camPhi));
  lastX = e.clientX; lastY = e.clientY;
  draw();
});
window.addEventListener('mouseup', () => { dragging = false; s3c.style.cursor = 'grab'; });

s3c.addEventListener('touchstart', e => { dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  camTheta += (e.touches[0].clientX - lastX) * 0.01;
  camPhi   += (e.touches[0].clientY - lastY) * 0.01;
  camPhi = Math.max(-1.4, Math.min(1.4, camPhi));
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  draw();
});
window.addEventListener('touchend', () => { dragging = false; });

function project3D(x, y, z, W, H, scale) {
  const cx = Math.cos(camTheta), sx = Math.sin(camTheta);
  const cy = Math.cos(camPhi),   sy = Math.sin(camPhi);
  const rx =  cx*x + sx*z;
  const ry = -sy*rx + cy*y;
  const rz =  cy*rx + sy*y;
  const rxx = cx*x + sx*z;
  const ryy = -sy*rxx + cy*y;
  const rzz = cy*rxx + sy*y;
  const px = cx*x + sx*z;
  const pz = -sx*x + cx*z;
  const py2 = -sy*px + cy*y;
  const pz2 = cy*px + sy*y;
  const px2 = cx*x + sx*z;
  return {
    sx: W/2 + (cx*x + sx*z) * scale,
    sy: H/2 - (-sy*(cx*x+sx*z) + cy*y) * scale,
    depth: cy*(cx*x+sx*z) + sy*y
  };
}

function proj(x, y, z, W, H, scale) {
  const e1x = Math.cos(camTheta), e1z = -Math.sin(camTheta);
  const e2x = Math.sin(camPhi)*Math.sin(camTheta), e2y = Math.cos(camPhi), e2z = Math.sin(camPhi)*Math.cos(camTheta);
  const e3x = Math.cos(camPhi)*Math.sin(camTheta), e3y = -Math.sin(camPhi), e3z = Math.cos(camPhi)*Math.cos(camTheta);
  return {
    sx: W/2 + (e1x*x + 0*y + e1z*z) * scale,
    sy: H/2 - (e2x*x + e2y*y + e2z*z) * scale,
    depth: e3x*x + e3y*y + e3z*z
  };
}

function getQuaternion() {
  const angle = parseFloat(document.getElementById('angle').value) * Math.PI / 180;
  let ax = parseFloat(document.getElementById('ax').value);
  let ay = parseFloat(document.getElementById('ay').value);
  let az = parseFloat(document.getElementById('az').value);
  const len = Math.sqrt(ax*ax + ay*ay + az*az) || 1;
  ax /= len; ay /= len; az /= len;
  const s = Math.sin(angle/2);
  return {
    w: Math.cos(angle/2),
    x: ax * s, y: ay * s, z: az * s,
    ax, ay, az, angle
  };
}

function rotateVecByQ(q, vx, vy, vz) {
  const qx = q.x, qy = q.y, qz = q.z, qw = q.w;
  const tx = 2*(qy*vz - qz*vy);
  const ty = 2*(qz*vx - qx*vz);
  const tz = 2*(qx*vy - qy*vx);
  return {
    x: vx + qw*tx + qy*tz - qz*ty,
    y: vy + qw*ty + qz*tx - qx*tz,
    z: vz + qw*tz + qx*ty - qy*tx
  };
}

function drawSphere(ctx, W, H) {
  const scale = W * 0.38;
  ctx.strokeStyle = 'rgba(128,128,128,0.15)';
  ctx.lineWidth = 0.5;
  for (let lat = -80; lat <= 80; lat += 20) {
    const r = Math.cos(lat*Math.PI/180);
    const yy = Math.sin(lat*Math.PI/180);
    ctx.beginPath();
    for (let lng = 0; lng <= 360; lng += 5) {
      const p = proj(r*Math.cos(lng*Math.PI/180), yy, r*Math.sin(lng*Math.PI/180), W, H, scale);
      lng === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
    }
    ctx.stroke();
  }
  for (let lng = 0; lng < 360; lng += 30) {
    ctx.beginPath();
    for (let lat = -90; lat <= 90; lat += 5) {
      const r = Math.cos(lat*Math.PI/180);
      const yy = Math.sin(lat*Math.PI/180);
      const p = proj(r*Math.cos(lng*Math.PI/180), yy, r*Math.sin(lng*Math.PI/180), W, H, scale);
      lat === -90 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
    }
    ctx.stroke();
  }
}

function drawS3Canvas() {
  const W = s3c.width, H = s3c.height;
  ctx1.clearRect(0, 0, W, H);
  const scale = W * 0.38;

  drawSphere(ctx1, W, H);

  const q = getQuaternion();
  const pts = [{x:q.x,y:q.y,z:q.z,w:q.w}, {x:-q.x,y:-q.y,z:-q.z,w:-q.w}];
  const axis3d = proj(q.ax*0.85, q.ay*0.85, q.az*0.85, W, H, scale);
  const axisN  = proj(-q.ax*0.85, -q.ay*0.85, -q.az*0.85, W, H, scale);
  const origin = proj(0, 0, 0, W, H, scale);

  ctx1.strokeStyle = 'rgba(136,135,128,0.4)';
  ctx1.lineWidth = 1;
  ctx1.setLineDash([4, 4]);
  ctx1.beginPath();
  ctx1.moveTo(axisN.sx, axisN.sy);
  ctx1.lineTo(axis3d.sx, axis3d.sy);
  ctx1.stroke();
  ctx1.setLineDash([]);

  const surf0 = proj(q.x, q.y, q.z, W, H, scale);
  const surf1 = proj(-q.x, -q.y, -q.z, W, H, scale);

  ctx1.strokeStyle = 'rgba(55,138,221,0.5)';
  ctx1.lineWidth = 1.5;
  ctx1.setLineDash([3, 3]);
  ctx1.beginPath();
  ctx1.moveTo(surf0.sx, surf0.sy);
  ctx1.lineTo(surf1.sx, surf1.sy);
  ctx1.stroke();
  ctx1.setLineDash([]);

  ctx1.fillStyle = '#378ADD';
  ctx1.beginPath();
  ctx1.arc(surf0.sx, surf0.sy, 8, 0, Math.PI*2);
  ctx1.fill();
  ctx1.fillStyle = '#fff';
  ctx1.font = '500 11px var(--font-sans, sans-serif)';
  ctx1.textAlign = 'center';
  ctx1.textBaseline = 'middle';
  ctx1.fillText('q', surf0.sx, surf0.sy);

  ctx1.fillStyle = '#E24B4A';
  ctx1.beginPath();
  ctx1.arc(surf1.sx, surf1.sy, 8, 0, Math.PI*2);
  ctx1.fill();
  ctx1.fillStyle = '#fff';
  ctx1.fillText('−q', surf1.sx, surf1.sy);

  ctx1.fillStyle = 'rgba(136,135,128,0.8)';
  ctx1.font = '11px var(--font-sans, sans-serif)';
  ctx1.textAlign = 'left';
  ctx1.fillText('회전축', axis3d.sx + 6, axis3d.sy);
}

function drawSO3Canvas() {
  const W = so3c.width, H = so3c.height;
  ctx2.clearRect(0, 0, W, H);
  const scale = W * 0.34;
  const q = getQuaternion();

  const axes = [{x:1,y:0,z:0,color:'#E24B4A',label:'X'},{x:0,y:1,z:0,color:'#1D9E75',label:'Y'},{x:0,y:0,z:1,color:'#378ADD',label:'Z'}];
  const origin = proj(0, 0, 0, W, H, scale);

  axes.forEach(a => {
    const r = rotateVecByQ(q, a.x*0.75, a.y*0.75, a.z*0.75);
    const rp = proj(r.x, r.y, r.z, W, H, scale);
    ctx2.strokeStyle = a.color;
    ctx2.lineWidth = 2.5;
    ctx2.beginPath();
    ctx2.moveTo(origin.sx, origin.sy);
    ctx2.lineTo(rp.sx, rp.sy);
    ctx2.stroke();
    const dx = rp.sx - origin.sx, dy = rp.sy - origin.sy;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    ctx2.fillStyle = a.color;
    ctx2.beginPath();
    ctx2.moveTo(rp.sx, rp.sy);
    ctx2.lineTo(rp.sx - dx/len*10 + dy/len*5, rp.sy - dy/len*10 - dx/len*5);
    ctx2.lineTo(rp.sx - dx/len*10 - dy/len*5, rp.sy - dy/len*10 + dx/len*5);
    ctx2.closePath();
    ctx2.fill();
    ctx2.font = '500 12px var(--font-sans, sans-serif)';
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText(a.label, rp.sx + dx/len*14, rp.sy + dy/len*14);
  });

  ctx2.fillStyle = 'rgba(136,135,128,0.6)';
  ctx2.beginPath();
  ctx2.arc(origin.sx, origin.sy, 4, 0, Math.PI*2);
  ctx2.fill();

  ctx2.fillStyle = 'rgba(136,135,128,0.6)';
  ctx2.font = '11px var(--font-mono, monospace)';
  ctx2.textAlign = 'left';
  const angDeg = Math.round(q.angle * 180 / Math.PI);
  ctx2.fillText('θ = ' + angDeg + '°', 10, H - 12);
}

function updateUI() {
  const q = getQuaternion();
  const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(3);
  document.getElementById('qval').textContent = `[${fmt(q.w)}, ${fmt(q.x)}i, ${fmt(q.y)}j, ${fmt(q.z)}k]`;
  document.getElementById('negqval').textContent = `[${fmt(-q.w)}, ${fmt(-q.x)}i, ${fmt(-q.y)}j, ${fmt(-q.z)}k]`;

  const dot = q.w*q.w + q.x*q.x + q.y*q.y + q.z*q.z;
  const absDot = Math.abs(-dot);

  const euclidDiff = Math.sqrt(4*(q.w*q.w+q.x*q.x+q.y*q.y+q.z*q.z));
  document.getElementById('wrongbar').style.width = '100%';
  document.getElementById('wrongval').textContent = '||q − (−q)|| = ' + euclidDiff.toFixed(3) + '  (자세는 동일!)';
  document.getElementById('rightbar').style.width = '100%';
  document.getElementById('rightval').textContent = '|q · (−q)| = ' + Math.abs(-dot).toFixed(3) + '  → 오차 0°';
  document.getElementById('angleval').textContent = Math.round(parseFloat(document.getElementById('angle').value));
}

function draw() {
  drawS3Canvas();
  drawSO3Canvas();
  updateUI();
}

['ax','ay','az','angle'].forEach(id => {
  document.getElementById(id).addEventListener('input', draw);
});

s3c.width = 620; s3c.height = 620;
so3c.width = 620; so3c.height = 620;

draw();

let t = 0;
function animate() {
  if (!dragging) {
    camTheta += 0.003;
    draw();
  }
  requestAnimationFrame(animate);
}
animate();
</script>
