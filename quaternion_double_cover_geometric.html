<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quaternion Double Cover</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1b26; color: #c8d4f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }

.wrap { max-width: 860px; margin: 0 auto; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

canvas {
  background: #0f1117;
  border: 1px solid #2e3354;
  border-radius: 10px;
  display: block;
  width: 100%;
  cursor: grab;
}

.canvas-label { font-size: 12px; color: #8b96b8; margin: 0 0 5px; }
.canvas-hint  { font-size: 11px; color: #4a5270; margin: 5px 0 0; text-align: center; }

.panel {
  border: 1px solid #2e3354;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 14px;
}

.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

label { font-size: 12px; color: #8b96b8; }

input[type=range] { accent-color: #7eb8f7; }

.qval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.card-q {
  background: #0d1f3c;
  border: 1px solid #1e3a6e;
  border-radius: 8px;
  padding: 10px 12px;
}
.card-negq {
  background: #2a0f0f;
  border: 1px solid #5a1a1a;
  border-radius: 8px;
  padding: 10px 12px;
}
.card-tag { font-size: 11px; font-weight: 600; margin: 0 0 3px; }
.card-q   .card-tag { color: #7eb8f7; }
.card-negq .card-tag { color: #f77e7e; }
.card-val { font-size: 12px; font-family: monospace; color: #c8d4f0; margin: 0; }

.bar-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.bar-label { font-size: 11px; color: #8b96b8; margin: 0 0 4px; }
.bar-track { background: #2a2d3e; border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 4px; }
.bar-val { font-size: 11px; font-family: monospace; margin: 0; }
.bar-val-wrong { color: #f77e7e; }
.bar-val-right { color: #5dcaa5; }

.section-title { font-size: 12px; color: #8b96b8; font-weight: 500; margin: 0 0 8px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="grid2">
    <div>
      <p class="canvas-label">S³ 위의 단위 쿼터니언</p>
      <canvas id="s3canvas" width="620" height="620"></canvas>
      <p class="canvas-hint">드래그하여 회전</p>
    </div>
    <div>
      <p class="canvas-label">3D 공간에서의 실제 회전 결과</p>
      <canvas id="so3canvas" width="620" height="620"></canvas>
      <p class="canvas-hint">두 쿼터니언 모두 동일한 자세</p>
    </div>
  </div>

  <div class="panel">
    <div class="controls-grid">
      <div>
        <p class="canvas-label" style="margin-bottom:6px;">회전축</p>
        <div style="display:flex; gap:8px; align-items:center;">
          <label>X</label>
          <input type="range" id="ax" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
          <label>Y</label>
          <input type="range" id="ay" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
          <label>Z</label>
          <input type="range" id="az" min="-1" max="1" step="0.05" value="0.577" style="flex:1;">
        </div>
      </div>
      <div>
        <p class="canvas-label" style="margin-bottom:6px;">회전 각도: <span id="angleval" style="color:#c8d4f0;">120</span>°</p>
        <input type="range" id="angle" min="0" max="360" value="120" style="width:100%;">
      </div>
    </div>
    <div class="qval-grid">
      <div class="card-q">
        <p class="card-tag">q (앞면)</p>
        <p class="card-val" id="qval">—</p>
      </div>
      <div class="card-negq">
        <p class="card-tag">−q (대척점)</p>
        <p class="card-val" id="negqval">—</p>
      </div>
    </div>
  </div>

  <div class="panel">
    <p class="section-title">내적 유사도 비교</p>
    <div class="bar-section">
      <div>
        <p class="bar-label">단순 차이 (틀린 방법)</p>
        <div class="bar-track"><div id="wrongbar" style="height:100%; background:#c0392b; width:100%;"></div></div>
        <p class="bar-val bar-val-wrong" id="wrongval">오차 커 보임</p>
      </div>
      <div>
        <p class="bar-label">|내적| (올바른 방법)</p>
        <div class="bar-track"><div id="rightbar" style="height:100%; background:#1d9e75; width:100%;"></div></div>
        <p class="bar-val bar-val-right" id="rightval">|q·(−q)| = 1.000</p>
      </div>
    </div>
  </div>

</div>

<script>
const s3c  = document.getElementById('s3canvas');
const so3c = document.getElementById('so3canvas');
const ctx1 = s3c.getContext('2d');
const ctx2 = so3c.getContext('2d');

let camTheta = 0.5, camPhi = 0.4;
let dragging = false, lastX, lastY;

s3c.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; s3c.style.cursor = 'grabbing'; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta += (e.clientX - lastX) * 0.01;
  camPhi   += (e.clientY - lastY) * 0.01;
  camPhi    = Math.max(-1.4, Math.min(1.4, camPhi));
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; s3c.style.cursor = 'grab'; });
s3c.addEventListener('touchstart', e => { dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  camTheta += (e.touches[0].clientX - lastX) * 0.01;
  camPhi   += (e.touches[0].clientY - lastY) * 0.01;
  camPhi    = Math.max(-1.4, Math.min(1.4, camPhi));
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
});
window.addEventListener('touchend', () => { dragging = false; });

function proj(x, y, z, W, H, scale) {
  const e1x =  Math.cos(camTheta), e1z = -Math.sin(camTheta);
  const e2x =  Math.sin(camPhi) * Math.sin(camTheta);
  const e2y =  Math.cos(camPhi);
  const e2z =  Math.sin(camPhi) * Math.cos(camTheta);
  const e3x =  Math.cos(camPhi) * Math.sin(camTheta);
  const e3y = -Math.sin(camPhi);
  const e3z =  Math.cos(camPhi) * Math.cos(camTheta);
  return {
    sx:    W/2 + (e1x*x + e1z*z) * scale,
    sy:    H/2 - (e2x*x + e2y*y + e2z*z) * scale,
    depth:        e3x*x + e3y*y + e3z*z
  };
}

function getQuaternion() {
  const deg  = parseFloat(document.getElementById('angle').value);
  const half = deg * Math.PI / 180 / 2;
  let ax = parseFloat(document.getElementById('ax').value);
  let ay = parseFloat(document.getElementById('ay').value);
  let az = parseFloat(document.getElementById('az').value);
  const len = Math.sqrt(ax*ax + ay*ay + az*az) || 1;
  ax /= len; ay /= len; az /= len;
  const s = Math.sin(half);
  return { w: Math.cos(half), x: ax*s, y: ay*s, z: az*s, ax, ay, az, angleDeg: deg };
}

function rotateVec(q, vx, vy, vz) {
  const tx = 2*(q.y*vz - q.z*vy);
  const ty = 2*(q.z*vx - q.x*vz);
  const tz = 2*(q.x*vy - q.y*vx);
  return {
    x: vx + q.w*tx + q.y*tz - q.z*ty,
    y: vy + q.w*ty + q.z*tx - q.x*tz,
    z: vz + q.w*tz + q.x*ty - q.y*tx
  };
}

function drawSphereGrid(ctx, W, H, scale) {
  ctx.strokeStyle = 'rgba(100,110,160,0.25)';
  ctx.lineWidth = 0.5;
  for (let lat = -80; lat <= 80; lat += 20) {
    const r  = Math.cos(lat * Math.PI/180);
    const yy = Math.sin(lat * Math.PI/180);
    ctx.beginPath();
    for (let lng = 0; lng <= 360; lng += 5) {
      const p = proj(r*Math.cos(lng*Math.PI/180), yy, r*Math.sin(lng*Math.PI/180), W, H, scale);
      lng === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
    }
    ctx.stroke();
  }
  for (let lng = 0; lng < 360; lng += 30) {
    ctx.beginPath();
    for (let lat = -90; lat <= 90; lat += 5) {
      const r  = Math.cos(lat * Math.PI/180);
      const yy = Math.sin(lat * Math.PI/180);
      const p  = proj(r*Math.cos(lng*Math.PI/180), yy, r*Math.sin(lng*Math.PI/180), W, H, scale);
      lat === -90 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
    }
    ctx.stroke();
  }
}

function drawS3() {
  const W = s3c.width, H = s3c.height;
  ctx1.clearRect(0, 0, W, H);
  const scale = W * 0.38;

  drawSphereGrid(ctx1, W, H, scale);

  const q = getQuaternion();

  /* 회전축 점선 */
  const aHead = proj( q.ax*0.88,  q.ay*0.88,  q.az*0.88, W, H, scale);
  const aTail = proj(-q.ax*0.88, -q.ay*0.88, -q.az*0.88, W, H, scale);
  ctx1.strokeStyle = 'rgba(180,190,220,0.35)';
  ctx1.lineWidth = 1;
  ctx1.setLineDash([5, 5]);
  ctx1.beginPath();
  ctx1.moveTo(aTail.sx, aTail.sy);
  ctx1.lineTo(aHead.sx, aHead.sy);
  ctx1.stroke();
  ctx1.setLineDash([]);

  /* q ↔ −q 연결선 */
  const pq  = proj( q.x,  q.y,  q.z, W, H, scale);
  const pnq = proj(-q.x, -q.y, -q.z, W, H, scale);
  ctx1.strokeStyle = 'rgba(126,184,247,0.4)';
  ctx1.lineWidth = 1.5;
  ctx1.setLineDash([4, 4]);
  ctx1.beginPath();
  ctx1.moveTo(pq.sx, pq.sy);
  ctx1.lineTo(pnq.sx, pnq.sy);
  ctx1.stroke();
  ctx1.setLineDash([]);

  /* q 점 */
  ctx1.fillStyle = '#378ADD';
  ctx1.beginPath();
  ctx1.arc(pq.sx, pq.sy, 9, 0, Math.PI*2);
  ctx1.fill();
  ctx1.fillStyle = '#ffffff';
  ctx1.font = 'bold 11px monospace';
  ctx1.textAlign = 'center';
  ctx1.textBaseline = 'middle';
  ctx1.fillText('q', pq.sx, pq.sy);

  /* −q 점 */
  ctx1.fillStyle = '#c0392b';
  ctx1.beginPath();
  ctx1.arc(pnq.sx, pnq.sy, 9, 0, Math.PI*2);
  ctx1.fill();
  ctx1.fillStyle = '#ffffff';
  ctx1.fillText('−q', pnq.sx, pnq.sy);

  /* 축 라벨 */
  ctx1.fillStyle = 'rgba(160,170,200,0.7)';
  ctx1.font = '11px sans-serif';
  ctx1.textAlign = 'left';
  ctx1.textBaseline = 'middle';
  ctx1.fillText('축', aHead.sx + 6, aHead.sy);
}

function drawSO3() {
  const W = so3c.width, H = so3c.height;
  ctx2.clearRect(0, 0, W, H);
  const scale = W * 0.34;
  const q = getQuaternion();
  const origin = proj(0, 0, 0, W, H, scale);

  const axes = [
    { vx:1, vy:0, vz:0, color:'#e05555', label:'X' },
    { vx:0, vy:1, vz:0, color:'#3dbb87', label:'Y' },
    { vx:0, vy:0, vz:1, color:'#5599e0', label:'Z' }
  ];

  axes.forEach(a => {
    const r  = rotateVec(q, a.vx*0.78, a.vy*0.78, a.vz*0.78);
    const rp = proj(r.x, r.y, r.z, W, H, scale);
    const dx = rp.sx - origin.sx, dy = rp.sy - origin.sy;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;

    ctx2.strokeStyle = a.color;
    ctx2.lineWidth = 2.5;
    ctx2.beginPath();
    ctx2.moveTo(origin.sx, origin.sy);
    ctx2.lineTo(rp.sx, rp.sy);
    ctx2.stroke();

    ctx2.fillStyle = a.color;
    ctx2.beginPath();
    ctx2.moveTo(rp.sx, rp.sy);
    ctx2.lineTo(rp.sx - dx/len*11 + dy/len*5, rp.sy - dy/len*11 - dx/len*5);
    ctx2.lineTo(rp.sx - dx/len*11 - dy/len*5, rp.sy - dy/len*11 + dx/len*5);
    ctx2.closePath();
    ctx2.fill();

    ctx2.font = 'bold 13px sans-serif';
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText(a.label, rp.sx + dx/len*15, rp.sy + dy/len*15);
  });

  ctx2.fillStyle = 'rgba(160,170,200,0.6)';
  ctx2.beginPath();
  ctx2.arc(origin.sx, origin.sy, 4, 0, Math.PI*2);
  ctx2.fill();

  ctx2.fillStyle = 'rgba(140,150,190,0.7)';
  ctx2.font = '12px monospace';
  ctx2.textAlign = 'left';
  ctx2.textBaseline = 'bottom';
  ctx2.fillText('θ = ' + Math.round(q.angleDeg) + '°', 10, H - 8);
}

function updateUI() {
  const q = getQuaternion();
  const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(3);
  document.getElementById('qval').textContent    = `[${fmt(q.w)}, ${fmt(q.x)}i, ${fmt(q.y)}j, ${fmt(q.z)}k]`;
  document.getElementById('negqval').textContent = `[${fmt(-q.w)}, ${fmt(-q.x)}i, ${fmt(-q.y)}j, ${fmt(-q.z)}k]`;
  document.getElementById('angleval').textContent = Math.round(q.angleDeg);

  const dot  = q.w*q.w + q.x*q.x + q.y*q.y + q.z*q.z;
  const eucl = (2 * Math.sqrt(dot)).toFixed(3);
  document.getElementById('wrongval').textContent = '||q − (−q)|| = ' + eucl + '  (자세는 동일!)';
  document.getElementById('rightval').textContent = '|q · (−q)| = ' + Math.abs(-dot).toFixed(3) + '  → 오차 0°';
}

function draw() { drawS3(); drawSO3(); updateUI(); }

['ax','ay','az','angle'].forEach(id => document.getElementById(id).addEventListener('input', draw));

function animate() {
  if (!dragging) camTheta += 0.003;
  draw();
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
